<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <rect width="1024" height="1024" rx="224" fill="#000000"/>
  <g transform="translate(512 512)">
    <!-- Washer body -->
    <rect x="-200" y="-260" width="400" height="520" rx="44" fill="#FFFFFF"/>
    <!-- Control panel -->
    <line x1="-170" y1="-180" x2="170" y2="-180" stroke="#242C34" stroke-width="10" stroke-linecap="round"/>
    <!-- Detergent drawer -->
    <rect x="-150" y="-248" width="110" height="52" rx="26" fill="#FFFFFF" stroke="#242C34" stroke-width="10"/>
    <!-- Dial -->
    <circle cx="-95" cy="-222" r="36" fill="#FFFFFF" stroke="#242C34" stroke-width="10"/>
    <rect x="-118" y="-232" width="32" height="10" rx="5" fill="#05944F"/>
    <!-- Settings lines -->
    <line x1="70" y1="-238" x2="130" y2="-238" stroke="#242C34" stroke-width="10" stroke-linecap="round"/>
    <line x1="70" y1="-218" x2="130" y2="-218" stroke="#242C34" stroke-width="10" stroke-linecap="round"/>
    <line x1="70" y1="-198" x2="130" y2="-198" stroke="#242C34" stroke-width="10" stroke-linecap="round"/>
    <!-- Door -->
    <circle cx="0" cy="60" r="148" fill="#FFFFFF" stroke="#242C34" stroke-width="10"/>
    <circle cx="0" cy="60" r="118" fill="#FFFFFF" stroke="#242C34" stroke-width="10"/>
    <!-- Drum swirl -->
    <path d="M0 60 C0 -20 80 -30 98 10 C116 50 40 70 0 60Z" stroke="#242C34" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M0 60 C20 90 90 80 96 40 C102 0 30 -10 0 60Z" stroke="#05944F" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M0 60 C-70 70 -90 130 -50 148 C-10 166 20 90 0 60Z" stroke="#05944F" stroke-width="10" stroke-linecap="round" fill="none"/>
    <!-- Filter hatch -->
    <rect x="70" y="190" width="78" height="52" rx="12" fill="#FFFFFF" stroke="#242C34" stroke-width="10"/>
    <!-- Feet -->
    <rect x="-120" y="268" width="52" height="22" rx="6" fill="#242C34"/>
    <rect x="68" y="268" width="52" height="22" rx="6" fill="#242C34"/>
  </g>
</svg>
