<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <g transform="translate(256 256)">
    <!-- Washer body -->
    <rect x="-100" y="-130" width="200" height="260" rx="22" fill="#FFFFFF" stroke="#242C34" stroke-width="5"/>
    <!-- Control panel -->
    <line x1="-85" y1="-90" x2="85" y2="-90" stroke="#242C34" stroke-width="5" stroke-linecap="round"/>
    <!-- Detergent drawer -->
    <rect x="-75" y="-124" width="55" height="26" rx="13" fill="#FFFFFF" stroke="#242C34" stroke-width="5"/>
    <!-- Dial -->
    <circle cx="-47" cy="-111" r="18" fill="#FFFFFF" stroke="#242C34" stroke-width="5"/>
    <rect x="-59" y="-116" width="16" height="5" rx="2.5" fill="#05944F"/>
    <!-- Settings lines -->
    <line x1="35" y1="-119" x2="65" y2="-119" stroke="#242C34" stroke-width="5" stroke-linecap="round"/>
    <line x1="35" y1="-109" x2="65" y2="-109" stroke="#242C34" stroke-width="5" stroke-linecap="round"/>
    <line x1="35" y1="-99" x2="65" y2="-99" stroke="#242C34" stroke-width="5" stroke-linecap="round"/>
    <!-- Door -->
    <circle cx="0" cy="30" r="74" fill="#FFFFFF" stroke="#242C34" stroke-width="5"/>
    <circle cx="0" cy="30" r="59" fill="#FFFFFF" stroke="#242C34" stroke-width="5"/>
    <!-- Drum swirl -->
    <path d="M0 30 C0 -10 40 -15 49 5 C58 25 20 35 0 30Z" stroke="#242C34" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M0 30 C10 45 45 40 48 20 C51 0 15 -5 0 30Z" stroke="#05944F" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M0 30 C-35 35 -45 65 -25 74 C-5 83 10 45 0 30Z" stroke="#05944F" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- Filter hatch -->
    <rect x="35" y="95" width="39" height="26" rx="6" fill="#FFFFFF" stroke="#242C34" stroke-width="5"/>
    <!-- Feet -->
    <rect x="-60" y="134" width="26" height="11" rx="3" fill="#242C34"/>
    <rect x="34" y="134" width="26" height="11" rx="3" fill="#242C34"/>
  </g>
