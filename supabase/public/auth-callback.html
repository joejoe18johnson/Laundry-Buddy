<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Email confirmed · Laundry Buddy</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f6f6f6;
        color: #242c34;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        background: #fff;
        border-radius: 18px;
        padding: 32px 28px;
        max-width: 420px;
        width: 100%;
        text-align: center;
        border: 1px solid #e8e8e8;
        box-shadow: 0 8px 32px rgba(36, 44, 52, 0.08);
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 12px;
      }
      p {
        color: #424242;
        line-height: 1.55;
        margin: 0 0 16px;
      }
      a {
        color: #000;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Email confirmed</h1>
      <p id="status">Opening Laundry Buddy…</p>
      <p><a id="open-app" href="#">Tap here if the app does not open</a></p>
    </div>
    <script>
      (function () {
        var deepLink = 'laundrybuddy://auth/callback';
        var suffix = window.location.search || '';
        if (window.location.hash) {
          suffix += window.location.hash;
        }
        if (suffix) {
          deepLink += suffix.charAt(0) === '?' || suffix.charAt(0) === '#' ? suffix : '?' + suffix.slice(1);
        }

        var link = document.getElementById('open-app');
        link.href = deepLink;

        try {
          window.location.replace(deepLink);
        } catch (e) {
          document.getElementById('status').textContent = 'Tap the link below to open Laundry Buddy.';
        }

        setTimeout(function () {
          document.getElementById('status').textContent =
            'Open Laundry Buddy and log in with your phone number and password.';
        }, 2500);
      })();
    </script>
  </body>
</html>
