<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Laundry Buddy</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f6f6f6;
        color: #242c34;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        background: #fff;
        border-radius: 18px;
        padding: 32px 28px;
        max-width: 420px;
        width: 100%;
        text-align: center;
        border: 1px solid #e8e8e8;
        box-shadow: 0 8px 32px rgba(36, 44, 52, 0.08);
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 12px;
      }
      p {
        color: #424242;
        line-height: 1.55;
        margin: 0 0 16px;
      }
      .error {
        color: #b42318;
      }
      .btn {
        display: inline-block;
        margin-top: 8px;
        padding: 14px 20px;
        border-radius: 12px;
        background: #000;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
      }
      .btn-secondary {
        display: inline-block;
        margin-top: 12px;
        color: #000;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 id="title">Opening Laundry Buddy</h1>
      <p id="status">Launching the app…</p>
      <a id="open-app" class="btn" href="#">Open Laundry Buddy</a>
      <div><a id="open-android" class="btn-secondary" href="#" style="display: none">Open on Android</a></div>
    </div>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var hostId = (params.get('host') || '').trim();
        var hostUserId = (params.get('user') || '').trim();
        var title = document.getElementById('title');
        var status = document.getElementById('status');
        var openApp = document.getElementById('open-app');
        var openAndroid = document.getElementById('open-android');
        var packageName = 'com.laundrybuddy.app';

        if (!hostId && !hostUserId) {
          title.textContent = 'Invalid link';
          status.textContent = 'This host profile link is missing its host id.';
          status.className = 'error';
          openApp.style.display = 'none';
          return;
        }

        if (!hostId && hostUserId) {
          hostId = 'host-' + hostUserId.slice(0, 8);
        }

        var deepLink = 'laundrybuddy://host/' + encodeURIComponent(hostId);
        if (hostUserId) {
          deepLink += '?user=' + encodeURIComponent(hostUserId);
        }

        openApp.href = deepLink;

        var isAndroid = /Android/i.test(navigator.userAgent);
        var isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
        var intentUrl = null;

        if (isAndroid) {
          var intentPath = deepLink.replace(/^laundrybuddy:\/\//, '');
          intentUrl =
            'intent://' +
            intentPath +
            '#Intent;scheme=laundrybuddy;package=' +
            packageName +
            ';S.browser_fallback_url=' +
            encodeURIComponent(window.location.href) +
            ';end';
          openAndroid.style.display = 'inline-block';
          openAndroid.href = intentUrl;
        }

        function tryOpenApp() {
          if (isAndroid && intentUrl) {
            window.location.replace(intentUrl);
            return;
          }

          if (isIOS) {
            var iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = deepLink;
            document.body.appendChild(iframe);
            window.setTimeout(function () {
              try {
                document.body.removeChild(iframe);
              } catch (e) {}
            }, 2000);
          }

          window.location.replace(deepLink);
        }

        tryOpenApp();

        window.setTimeout(function () {
          title.textContent = 'Open host profile';
          status.textContent =
            'If Laundry Buddy did not open automatically, tap the button below.';
        }, 2200);
      })();
    </script>
  </body>
</html>
